<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 20px;
            text-align: center;
            background-color: #f5f5f5;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #e74c3c;
            margin: 0;
        }
        .error-message {
            font-size: 24px;
            color: #333;
            margin: 20px 0;
        }
        .error-description {
            color: #666;
            margin-bottom: 30px;
        }
        .home-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .home-link:hover {
            background-color: #2980b9;
        }
        footer {
            margin-top: 50px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1 class="error-code">404</h1>
    <p class="error-message">Page Not Found</p>
    <p class="error-description">Sorry, the page you are looking for doesn't exist or has been moved.</p>
    <a href="ipaddresses.html" class="home-link">Go to Home Page</a>
    
    <footer>
        <p>CS2026 Computer Networks Lab | GitHub Pages</p>
    </footer>
</body>
</html>
