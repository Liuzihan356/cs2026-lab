<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2026 Lab - Main Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, background 0.2s;
        }
        .link-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.25);
        }
        .link-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        .link-desc {
            font-size: 0.9em;
            opacity: 0.8;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CS2026 Lab</h1>
        <p class="subtitle">Computer Networks - Git & GitHub Pages</p>
        
        <div class="links">
            <a href="ipaddresses.html" class="link-card">
                <div class="link-title">IP Addresses Page</div>
                <div class="link-desc">Learn about different types of IP addresses and their uses</div>
            </a>
        </div>
        
        <footer>
            <p>Created: June 24, 2026</p>
            <p>Deployed with GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
